name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Validate glossary JSON files
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for f in glob.glob('glossaries/**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      data = json.load(fh)
                  assert 'domain' in data, f'{f}: missing domain'
                  assert 'language' in data, f'{f}: missing language'
                  assert 'terms' in data, f'{f}: missing terms'
                  assert len(data['terms']) >= 1, f'{f}: empty terms'
                  print(f'✅ {f}: {len(data[\"terms\"])} terms')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'❌ {f}: {e}')
          if errors:
              sys.exit(1)
          print('All glossary files valid!')
          "

      - name: Check imports
        run: |
          python -c "
          from backend.config import get_settings, SUPPORTED_LANGUAGES
          from backend.glossary import load_all_glossaries, get_available_glossaries
          from backend.verifier import compute_similarity, VerificationReport
          print('All imports successful!')
          "
